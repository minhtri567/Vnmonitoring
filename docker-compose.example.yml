services:
  api:
    build:
      context: ./Vnmonitoring.Server
    ports:
      - "7101:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=your-secret-key-minimum-32-characters
      - Jwt__Issuer=VnmonitoringAPI
      - Jwt__Audience=VnmonitoringClient
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=data_monitoring;Username=postgres;Password=your_password
      - MyConfig__ApiBaseUrl=http://your-api-url/path
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - db

  client:
    build:
      context: ./vnmonitoring.client
      args:
        IS_DOCKER: "true"
    environment:
      - IS_DOCKER=true
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - api

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    restart: always
    environment:
      POSTGRES_DB: data_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-data:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - client

volumes:
  pgdata:
