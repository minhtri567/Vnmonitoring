events {}
http {
    server {
        listen 80;
        server_name vietnammonitoring.com www.vietnammonitoring.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name vietnammonitoring.com www.vietnammonitoring.com;

        ssl_certificate /etc/letsencrypt/live/vietnammonitoring.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vietnammonitoring.com/privkey.pem;

        location /api/ {
            proxy_pass http://api:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://client:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
