server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache busting for files with hashes
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests - don't apply SPA fallback
    location /api/ {
        # This will return 404 if /api doesn't exist locally
        # The main nginx.conf should proxy these correctly
        try_files $uri =404;
    }

    # SPA fallback - requests go to index.html (except /api/)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
